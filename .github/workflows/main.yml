name: Deploy to Azure container app jobs

on:
    push:
        branches: [main]

env:
    AZURE_CONTAINER_REGISTERY: paypalcontainerregistery

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Log in to Azure
          uses: azure/login@v2
          with:
              creds: ${{ secrets.AZURE_CREDENTIALS }}

        - name: Login to ACR
          run: |
              az acr login --name paypalcontainerregistery

        - name: Build and push image
          run: |
              docker build --platform=linux/amd64 -t paypalcontainerregistery.azurecr.io/paypal-webhook-data-registery:${{ github.sha }} .
              docker push paypalcontainerregistery.azurecr.io/paypal-webhook-data-registery:${{ github.sha }}

        - name: Update job image
          run: |
              az containerapp update \
                  --name paypal-manual-changes-drive-sync \
                  --resource-group paypal \
                  --image paypalcontainerregistery.azurecr.io/paypal-webhook-data-registery:${{ github.sha }}
